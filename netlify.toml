[build]
  command = "npm run build"
  publish = "dist"

# Exposed to Vite at build time so the client posts to /api/register on Netlify only.
[build.environment]
  VITE_REGISTRATION_API = "/api/register"

[[redirects]]
  from = "/api/register"
  to = "/.netlify/functions/register"
  status = 200

# SPA fallback (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
